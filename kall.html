<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RK Garage Calculator</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a0a0f;
  color:#fff;
}
.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
}
h2{
  margin-bottom:20px;
  color:#c084fc;
  text-shadow:0 0 10px #7c3aed;
}
.section{
  margin-bottom:25px;
  padding:15px;
  background:#111018;
  border-radius:12px;
  border:1px solid #2a0f3a;
  box-shadow:0 0 15px rgba(124,58,237,0.15);
}
.section h3{
  color:#c084fc;
  margin-bottom:10px;
}
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #1f1b2e;
  cursor:pointer;
  transition:0.15s;
}
.item:hover{
  background:#1a102a;
}
.item:last-child{
  border-bottom:none;
}
label{
  cursor:pointer;
  flex:1;
}
input[type="checkbox"]{
  accent-color:#a855f7;
  transform:scale(1.1);
  margin-right:10px;
}
.price{
  color:#a855f7;
  font-weight:bold;
}
.total-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:#120d1f;
  border:1px solid #3b1d5e;
  border-radius:12px;
  position:sticky;
  bottom:0;
  box-shadow:0 0 20px rgba(168,85,247,0.2);
}
.total{
  font-size:28px;
  color:#c084fc;
  font-weight:bold;
  text-shadow:0 0 10px #7c3aed;
}
button{
  background:#1a102a;
  color:#fff;
  border:1px solid #3b1d5e;
  padding:10px 15px;
  cursor:pointer;
  border-radius:8px;
  transition:0.2s;
}
button:hover{
  background:#2a1742;
  box-shadow:0 0 10px #7c3aed;
}
</style>
</head>
<body>
<div class="container">

<h2>RK Garage Calculator</h2>

<div id="list"></div>

<div class="total-box">
  <div>
    <div>TOTAL BIAYA</div>
    <div id="count">0 item dipilih</div>
  </div>
  <div class="total" id="total">$0</div>
  <button onclick="resetAll()">RESET SEMUA</button>
</div>

</div>

<script>
const data = {
  "PAINT": [
    ["PRIMARY",20000],
    ["SECONDARY",20000],
    ["PEARLESCENT",15000],
    ["INTERIOR",15000],
    ["DASHBOARD",15000]
  ],
  "APPEARANCE": [
    ["SPOILER",25000],
    ["FRONT BUMPER",25000],
    ["REAR BUMPER",25000],
    ["ROOF",25000],
    ["SIDE SKIRT",20000],
    ["EXHAUST",15000],
    ["FRAME (ROLLCAGE)",15000],
    ["GRILL",10000],
    ["HOOD",30000],
    ["LEFT FENDER",15000],
    ["ENGINE BLOCK",10000],
    ["LIVERY",15000],
    ["TRIM",15000],
    ["STRUTS",13000],
    ["FRONT VANITY PLATES",13000],
    ["LICENSE PLATE HOLDER",13000],
    ["LICENSE PLATE",20000],
    ["PLAQUE",13000],
    ["SPEAKERS",13000],
    ["TRUNK",15000],
    ["WINGS",25000],
    ["FUEL TANK",15000],
    ["AERIALS",15000],
    ["ARCH COVERS",15000],
    ["HORNS",15000],
    ["HYDRAULICS",15000]
  ],
  "WINDOW TINT": [
    ["0%",2000],
    ["10%",5000],
    ["50%",7000],
    ["60%",10000],
    ["80%",20000],
    ["100%",30000]
  ],
  "INTERIOR": [
    ["INTERIOR",15000],
    ["ORNAMENTS",15000],
    ["DASHBOARD",15000],
    ["DIAL",15000],
    ["SHIFTING LEAVERS",15000],
    ["DOOR SPEAKER",13000],
    ["SEATS",15000],
    ["STEERING WHEELS",15000],
    ["VEHICLE EXTRAS",15000]
  ],
  "NEON & XENON": [
    ["NEON ALL 4 SIDE",25000],
    ["NEON COLOR",15000],
    ["XENON INSTALLATION",25000],
    ["XENON COLOR",15000]
  ],
  "WHEEL": [
    ["WHEEL COLOR",15000],
    ["TIRE SMOKE COLOR",20000],
    ["WHEEL TYPES",30000],
    ["TIRE ENHANCEMENTS",25000],
    ["CAMBER (STANCER)",50000],
    ["SPACERS (STANCER)",30000]
  ],
  "PERFORMANCE": [
    ["ENGINE (CAR)",150000],
    ["ENGINE (BIKE)",120000],
    ["BRAKES",100000],
    ["TRANSMISSION",140000],
    ["ARMOUR",150000],
    ["TURBO",110000]
  ],
  "SUSPENSION": [
    ["LOWERED",15000],
    ["STREET",20000],
    ["SPORTS",35000],
    ["COMPETITION",60000]
  ]
};

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';

  Object.keys(data).forEach(section => {
    const div = document.createElement('div');
    div.className = 'section';

    let html = `<h3>${section}</h3>`;

    data[section].forEach(item => {
      html += `
      <div class="item" onclick="toggleItem(this)">
        <label>
          <input type="checkbox" value="${item[1]}" onchange="calc()">
          ${item[0]}
        </label>
        <span class="price">$${item[1].toLocaleString()}</span>
      </div>`;
    });

    div.innerHTML = html;
    list.appendChild(div);
  });
}

function toggleItem(el){
  let checkbox = el.querySelector('input[type=checkbox]');
  checkbox.checked = !checkbox.checked;
  calc();
}

function calc(){
  let total = 0;
  let count = 0;

  document.querySelectorAll('input[type=checkbox]').forEach(cb => {
    if(cb.checked){
      total += parseInt(cb.value);
      count++;
    }
  });

  document.getElementById('total').innerText = "$" + total.toLocaleString();
  document.getElementById('count').innerText = count + " item dipilih";
}

function resetAll(){
  document.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
  calc();
}

render();
</script>

</body>
</html>
